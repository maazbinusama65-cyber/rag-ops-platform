

# ── Shared network ──────────────────────────────────────────────────────────
networks:
  ragops:
    driver: bridge

# ── Persistent volumes ──────────────────────────────────────────────────────
volumes:
  postgres_data:
  minio_data:
  chroma_data:
  ollama_data:
  airflow_logs:
  airflow_plugins:
  airflow_dags:
  prometheus_data:
  grafana_data:

# ── Common healthcheck template ─────────────────────────────────────────────
x-healthcheck: &healthcheck
  interval: 30s
  timeout: 10s
  retries: 5
  start_period: 30s

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ragops
      POSTGRES_USER: ragops
      POSTGRES_PASSWORD: ragops_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5433:5432"
    networks:
      - ragops
    healthcheck:
      <<: *healthcheck
      test: ["CMD-SHELL", "pg_isready -U ragops -d ragops"]

  # ── MinIO ───────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console UI
    networks:
      - ragops
    healthcheck:
      <<: *healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]

  # ── ChromaDB ────────────────────────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:0.5.3
    environment:
      CHROMA_SERVER_AUTHN_CREDENTIALS: ""
      ANONYMIZED_TELEMETRY: "False"
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "8001:8000"
    networks:
      - ragops
    healthcheck:
      <<: *healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]

  # ── Ollama ──────────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - ragops
    # Uncomment for GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    healthcheck:
      <<: *healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]

  # ── Ollama model puller (init container) ────────────────────────────────────
  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - ragops
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "ollama pull mistral &&
       ollama pull nomic-embed-text &&
       echo '✅ Models pulled successfully'"
    restart: "no"

  # ── FastAPI Gateway ─────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_ENV: development
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ragops
      POSTGRES_USER: ragops
      POSTGRES_PASSWORD: ragops_secret
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      OLLAMA_BASE_URL: http://ollama:11434
    ports:
      - "8000:8000"
    networks:
      - ragops
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    volumes:
      - ./app:/app/app  # Live reload in dev
    restart: unless-stopped

  # ── Apache Airflow ──────────────────────────────────────────────────────────
  airflow-init:
    image: apache/airflow:2.9.3
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://ragops:ragops_secret@postgres/ragops
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    entrypoint: /bin/bash
    command: -c "airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@ragops.local"
    networks:
      - ragops
    restart: "no"

  airflow-webserver:
    image: apache/airflow:2.9.3
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://ragops:ragops_secret@postgres/ragops
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: "ragops_secret_key_change_in_prod"
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      CHROMA_HOST: chromadb
      CHROMA_PORT: "8000"
      OLLAMA_BASE_URL: http://ollama:11434
    volumes:
      - ./pipeline/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
      - airflow_plugins:/opt/airflow/plugins
    ports:
      - "8080:8080"
    networks:
      - ragops
    command: webserver
    restart: unless-stopped

  airflow-scheduler:
    image: apache/airflow:2.9.3
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://ragops:ragops_secret@postgres/ragops
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      CHROMA_HOST: chromadb
      CHROMA_PORT: "8000"
      OLLAMA_BASE_URL: http://ollama:11434
    volumes:
      - ./pipeline/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
      - airflow_plugins:/opt/airflow/plugins
    networks:
      - ragops
    command: scheduler
    restart: unless-stopped

  # ── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.1
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    networks:
      - ragops
    restart: unless-stopped

  # ── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DATASOURCES_DEFAULT_PATH: /etc/grafana/provisioning/datasources
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    networks:
      - ragops
    depends_on:
      - prometheus
    restart: unless-stopped
