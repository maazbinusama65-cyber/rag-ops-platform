groups:
  - name: rag_ops_alerts
    rules:
      - alert: HighQueryLatency
        expr: histogram_quantile(0.95, rate(llm_generation_latency_seconds_bucket[5m])) > 30
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "LLM generation latency is high"
          description: "95th percentile LLM generation latency is {{ $value }}s (threshold: 30s)"

      - alert: HighRetrievalLatency
        expr: histogram_quantile(0.95, rate(rag_retrieval_latency_seconds_bucket[5m])) > 2
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "ChromaDB retrieval latency is high"
          description: "95th percentile retrieval latency is {{ $value }}s (threshold: 2s)"

      - alert: HighErrorRate
        expr: rate(rag_queries_total{status="error"}[5m]) / rate(rag_queries_total[5m]) > 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High query error rate"
          description: "Error rate is {{ $value | humanizePercentage }} (threshold: 10%)"

      - alert: APIDown
        expr: up{job="rag-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "RAG API is down"
          description: "The FastAPI gateway has been unreachable for more than 1 minute"
